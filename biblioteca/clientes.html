<!doctype html>
<html lang="es">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="stylesheet" href="./resources/css/output.css" />
		<title>Biblioteca - Clientes</title>
	</head>
	<body class="scroll-smooth">
		<header class="bg-zinc-50 text-[#5d4037] font-serif">
			<div class="max-w-3xl p-3 flex justify-between mx-auto flex-wrap">
				<div>
					<h1 class="animate-entrada text-3xl font-bold italic">Biblioteca</h1>
				</div>
				<nav class="flex flex-row gap-4 align-middle justify-center">
					<a href="./index.html" class="block content-center hover:underline">Inicio</a>
					<a href="./libros.html" class="block content-center hover:underline">Libros</a>
					<a href="./clientes.html" class="block content-center hover:underline">Clientes</a>
				</nav>
			</div>
		</header>
		<div class="bg-zinc-200 p-3">
			<div class="mx-auto max-w-3xl">
				<a href="#sugerencias" class="hover:brightness-110 block w-fit px-10 py-2 text-white bg-[#626f47]">TENGO UNA SUGERENCIA</a>
			</div>
		</div>
		<main class="mt-5 p-3 max-w-3xl mx-auto bg-zinc-50 min-h-[50vh]">
			<section class="mt-6">
				<h2 class="text-2xl font-serif text-[#141223] mb-6 border-b pb-2">Nuestros Clientes</h2>
				<ul class="flex flex-col gap-6">
					<li class="flex items-center gap-4 p-4 bg-white rounded-lg shadow-sm hover:shadow-md transition-shadow border border-zinc-100">
						<img src="./resources/images/usuario.webp" alt="Avatar Usuario" class="size-16 rounded-full object-cover bg-zinc-200" />
						<div class="flex flex-col">
							<span class="text-lg font-bold text-[#5d4037]">Juan Pérez</span>
							<span class="text-sm text-gray-600">juan.perez@email.com</span>
						</div>
					</li>
					<li class="flex items-center gap-4 p-4 bg-white rounded-lg shadow-sm hover:shadow-md transition-shadow border border-zinc-100">
						<img src="./resources/images/usuario.webp" alt="Avatar Usuario" class="size-16 rounded-full object-cover bg-zinc-200" />
						<div class="flex flex-col">
							<span class="text-lg font-bold text-[#5d4037]">María García</span>
							<span class="text-sm text-gray-600">maria.garcia@email.com</span>
						</div>
					</li>
					<li class="flex items-center gap-4 p-4 bg-white rounded-lg shadow-sm hover:shadow-md transition-shadow border border-zinc-100">
						<img src="./resources/images/usuario.webp" alt="Avatar Usuario" class="size-16 rounded-full object-cover bg-zinc-200" />
						<div class="flex flex-col">
							<span class="text-lg font-bold text-[#5d4037]">Lionel Messi</span>
							<span class="text-sm text-gray-600">lapulga@email.com</span>
						</div>
					</li>
					<li class="flex items-center gap-4 p-4 bg-white rounded-lg shadow-sm hover:shadow-md transition-shadow border border-zinc-100">
						<img src="./resources/images/usuario.webp" alt="Avatar Usuario" class="size-16 rounded-full object-cover bg-zinc-200" />
						<div class="flex flex-col">
							<span class="text-lg font-bold text-[#5d4037]">Ana Martínez</span>
							<span class="text-sm text-gray-600">ana.martinez@email.com</span>
						</div>
					</li>
				</ul>
			</section>
		</main>
		<footer class="bg-[#5d4037] text-white py-8">
			<div class="max-w-3xl mx-auto p-3">
				<form action="" id="sugerencias" class="flex flex-col gap-4 max-w-md mx-auto bg-[#4e362f] p-6 rounded-lg shadow-inner">
					<h3 class="text-2xl font-serif border-b border-[#6d4c41] pb-2">Mandá tu sugerencia</h3>

					<div class="flex flex-col gap-1">
						<label for="nombre" class="text-sm text-zinc-300">Nombre</label>
						<input type="text" required id="nombre" class="bg-zinc-50 text-black px-3 py-2 rounded-sm focus:ring-2 focus:ring-[#c8a482] outline-none transition-all" placeholder="Tu nombre" />
					</div>

					<div class="flex flex-col gap-1">
						<label for="correo" class="text-sm text-zinc-300">Correo</label>
						<input type="email" required id="correo" class="bg-zinc-50 text-black px-3 py-2 rounded-sm focus:ring-2 focus:ring-[#c8a482] outline-none transition-all" placeholder="ejemplo@correo.com" />
					</div>

					<div class="flex flex-col gap-1">
						<label for="msj" class="text-sm text-zinc-300">Sugerencia</label>
						<textarea
                            required
							id="msj"
							class="bg-zinc-50 text-black px-3 py-2 rounded-sm focus:ring-2 focus:ring-[#c8a482] outline-none transition-all resize-none"
							placeholder="¿En qué podemos mejorar?"
						></textarea>
					</div>

					<button type="submit" class="bg-[#c8a482] hover:bg-[#b89371] text-white font-bold py-2 mt-2 transition-colors rounded-sm uppercase text-sm tracking-wider">Enviar Mensaje</button>
				</form>

				<div class="border-t border-[#6d4c41] mt-10 mb-6"></div>

				<div class="flex flex-col gap-5 md:flex-row md:justify-between items-center">
					<h2 class="font-serif text-2xl italic">Biblioteca</h2>
					<nav class="flex flex-row gap-4 text-sm text-zinc-300">
						<a href="" class="hover:text-white hover:underline transition-colors">Términos</a>
						<a href="" class="hover:text-white hover:underline transition-colors">Contacto</a>
						<a href="" class="hover:text-white hover:underline transition-colors">Sobre Nosotros</a>
					</nav>
				</div>
			</div>
		</footer>
	</body>
</html>
